name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel:
          - { version: '11.*', testbench: '9.*' }
          - { version: '12.*', testbench: '10.*' }

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, mbstring
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ matrix.php }}-${{ matrix.laravel.version }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-${{ matrix.laravel.version }}-

      - name: Pin Laravel and Testbench versions
        run: |
          composer require \
            "illuminate/contracts:${{ matrix.laravel.version }}" \
            "illuminate/http:${{ matrix.laravel.version }}" \
            "illuminate/support:${{ matrix.laravel.version }}" \
            --no-update --no-interaction
          composer require --dev \
            "orchestra/testbench:${{ matrix.laravel.testbench }}" \
            --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pest
        run: composer test

  format:
    runs-on: ubuntu-latest
    name: Pint (format check)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: composer format-check
